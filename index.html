<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI입문 출석 좌석 시스템 — 데모</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard','Apple SD Gothic Neo','Segoe UI',sans-serif;background:#ffffff;color:#2c3e50;min-height:100vh;letter-spacing:-0.01em}
button{cursor:pointer;border:none;border-radius:7px;padding:7px 15px;font-size:12px;font-weight:600;transition:all .16s}
input,select,textarea{border:1.5px solid #c5d2e0;border-radius:7px;padding:7px 10px;font-size:13px;font-family:inherit;background:#fff}

/* HEADER */
#header{background:linear-gradient(135deg,#4a90d9,#6aaee8);color:#fff;padding:14px 24px;display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:16px;box-shadow:0 2px 10px rgba(74,144,217,.35)}
.header-left{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.header-left h1{font-size:16px;font-weight:700;white-space:nowrap}
.badge{padding:3px 10px;border-radius:10px;font-size:11px;font-weight:700;white-space:nowrap}
.badge-admin{background:#f0a060;color:#fff}
.badge-student{background:#60c890;color:#fff}
.header-center{text-align:center;font-size:19px;font-weight:800;line-height:1.6;letter-spacing:-0.01em}
.header-center span{font-size:14px;opacity:.9;font-weight:600}

/* MODE TOGGLE — 상단 스위치 */
#mode-switch-bar{
  background:#fff;
  border-bottom:2px solid #dde6f0;
  padding:10px 24px;
  display:flex;align-items:center;gap:12px
}
#mode-switch-bar span{font-size:12px;color:#5a7a9a;font-weight:600}
#mode-toggle{display:flex;gap:0;background:#eaf0f8;border-radius:9px;padding:3px;border:1px solid #c8d8e8}
#mode-toggle button{
  background:transparent;color:#6a8aaa;
  padding:7px 22px;border-radius:7px;font-size:13px;font-weight:600;
  border:none;transition:all .2s
}
#mode-toggle button.active{
  background:#4a90d9;color:#fff;
  box-shadow:0 2px 8px rgba(74,144,217,.4)
}
.mode-desc{font-size:11px;color:#8a9ab0;margin-left:4px}

#closed-banner{background:#f0c8c8;color:#8b2020;text-align:center;padding:7px;font-size:12px;font-weight:700;display:none}

/* LAYOUT */
.view{padding:12px 16px;max-width:1700px;margin:0 auto}
#topbar{background:#fff;border-radius:10px;padding:10px 14px;margin-bottom:10px;box-shadow:0 1px 6px rgba(0,0,0,.07);border:1px solid #dde6f0;display:flex;align-items:center;gap:8px;flex-wrap:wrap}

.btn-red{background:#f5c8c8;color:#9b2020;border:1px solid #e8a0a0}.btn-red:hover{background:#f0a0a0}
.btn-green{background:#c8f0d8;color:#1a6030;border:1px solid #90d0a8}.btn-green:hover{background:#a0e0b8}
.btn-orange{background:#fde8c8;color:#7a4010;border:1px solid #f0c080}.btn-orange:hover{background:#f8d098}
.btn-gray{background:#e4eaf0;color:#4a5568;border:1px solid #c8d4e0}.btn-gray:hover{background:#c8d8e8}
.btn-blue{background:#c8dff8;color:#1a3a7a;border:1px solid #90b8e8}.btn-blue:hover{background:#a8cef8}
.btn-purple{background:#e4ccf5;color:#5a2080;border:1px solid #d0a8ec}.btn-purple:hover{background:#d8b0f0}
.my-badge{background:#d0e8ff;color:#1a3a7a;border-radius:7px;padding:3px 9px;font-size:11px;font-weight:700;border:1px solid #90b8e8}

#main-layout{display:flex;gap:12px;align-items:flex-start}
#sidebar{width:180px;flex-shrink:0;display:flex;flex-direction:column;gap:9px}
.card{background:#fff;border-radius:10px;padding:13px;box-shadow:0 1px 6px rgba(0,0,0,.07);border:1px solid #dde6f0}
.card h3{font-size:14px;font-weight:800;color:#4a90d9;border-bottom:1.5px solid #eaf0f8;padding-bottom:5px;margin-bottom:8px;letter-spacing:.5px}
.stat-row{display:flex;justify-content:space-between;font-size:14px;margin-bottom:5px;align-items:center}
.stat-num{font-weight:800;font-size:16px}
.c-blue{color:#4a90d9}.c-green{color:#2ecc71}.c-red{color:#e74c3c}
#prog-bg{background:#eaf0f8;border-radius:5px;height:6px;overflow:hidden;margin-top:8px}
#prog-fill{background:linear-gradient(90deg,#4a90d9,#2ecc71);height:100%;width:0;transition:width .4s;border-radius:5px}
#prog-txt{font-size:10px;color:#8a9ab0;text-align:right;margin-top:2px}

.list-hint{font-size:10px;color:#8a9ab0;margin-bottom:6px;line-height:1.5;background:#f0f6ff;padding:5px 7px;border-radius:5px;border:1px solid #d0e4f8}
.student-guide{background:#fff8e6;border:1.5px solid #f5d896;border-radius:10px;padding:12px 18px;font-size:15px;font-weight:700;color:#a06820;line-height:1.8;text-align:center}
.student-guide b{color:#e08a3a}
#name-list{list-style:none;max-height:340px;overflow-y:auto}
#name-list::-webkit-scrollbar{width:3px}
#name-list::-webkit-scrollbar-thumb{background:#c0d0e0;border-radius:2px}
#name-list li{padding:7px 9px;border-radius:6px;font-size:14px;font-weight:600;background:#f8fafc;margin-bottom:4px;border:1.5px solid #dde6f0;user-select:none;transition:all .15s;display:flex;justify-content:space-between;align-items:center}
#name-list li.can-drag{cursor:grab}
#name-list li.can-drag:active{cursor:grabbing}
#name-list li.can-drag:hover{background:#dbeeff;border-color:#7ab8e8;transform:translateX(2px)}
#name-list li.seated{background:#d8f5e4;border-color:#7dd4a0;color:#1a5530}
#name-list li.seated .chk{color:#2ecc71;font-weight:700}
#name-list li.is-me{background:#d8eeff;border-color:#70b0e8;font-weight:700}
#name-list li.dragging{opacity:.3;transform:scale(.95)}

#chart-wrap{background:#ffffff;border-radius:14px;padding:18px 20px;box-shadow:0 2px 10px rgba(0,0,0,.08);border:1px solid #d0dced;overflow-x:auto;flex:1;min-width:0}
.chart-outer{display:inline-flex;flex-direction:column;align-items:stretch}
.board-bar{background:linear-gradient(135deg,#3d9e3d,#52b852);color:#fff;text-align:center;padding:10px 18px;border-radius:10px;font-weight:700;font-size:13px;letter-spacing:6px;box-shadow:0 3px 8px rgba(61,158,61,.35);margin-bottom:14px}
.back-bar{background:#e0e8f2;color:#8a9ab0;text-align:center;padding:7px 18px;border-radius:8px;font-size:11px;letter-spacing:2px;border:1px dashed #c0d0e0;margin-top:14px}

.sections-row{display:flex;gap:28px;align-items:flex-start}
.section{display:flex;flex-direction:column}
.desk-row{display:flex;gap:4px;margin-bottom:10px;align-items:center}

.seat{width:62px;height:40px;border-radius:7px;border:1.5px solid #c8d6e8;background:#eef3fa;display:flex;align-items:center;justify-content:center;font-size:12.5px;font-weight:600;cursor:pointer;user-select:none;transition:background .16s,border-color .16s,transform .16s;overflow:hidden}
.seat.ghost{background:transparent;border-color:transparent;cursor:default;pointer-events:none}
.seat.access{background:#fffbea;border-color:#f0d060;border-style:dashed;font-size:17px;cursor:default;pointer-events:none}
.seat.empty:hover{background:#cce4ff;border-color:#70b0e8;transform:scale(1.06);cursor:pointer}
.seat.occupied{background:#c6ecd4;border-color:#5db880;color:#1a5030;font-weight:700;box-shadow:0 1px 4px rgba(80,170,110,.2)}
.seat.occupied:hover{background:#ffd0d0;border-color:#e08080;color:#8b2020}
.seat.mine{background:#b8d8ff;border-color:#5090d8;color:#1a3870;font-weight:700;box-shadow:0 1px 4px rgba(80,140,220,.25)}
.seat.mine:hover{background:#ffe0b8;border-color:#e0a050;color:#7a3010}
.seat.selected-src{border:2.5px dashed #f0a030!important;background:#fff8d8!important;animation:srcpulse .55s infinite alternate}
@keyframes srcpulse{from{box-shadow:0 0 5px rgba(240,160,48,.4)}to{box-shadow:0 0 14px rgba(240,160,48,.9)}}
.seat.dragover{background:#a8d0ff!important;border-color:#3a80d0!important;transform:scale(1.1)}
.seat.flash{animation:flashseat .4s ease}
@keyframes flashseat{0%{background:#fff7a0}50%{background:#ffe030;transform:scale(1.12)}100%{}}

.door-cell{width:42px;height:40px;margin-bottom:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#5a7a9a;background:#e8f0f8;border:1px dashed #b0c8e0;border-radius:7px;line-height:1.3;text-align:center}
.door-ghost{width:42px;height:40px;margin-bottom:10px}

#absent-wrap{margin-top:10px}
.absent-card{background:#fff;border-radius:10px;padding:13px;box-shadow:0 1px 6px rgba(0,0,0,.07);border:1px solid #dde6f0}
.absent-card h3{font-size:12px;color:#e05050;margin-bottom:7px}
.chips{display:flex;flex-wrap:wrap;gap:5px}
.chip{background:#fde8e8;border:1px solid #e8b0b0;border-radius:5px;padding:3px 8px;font-size:11px;color:#9b2020}

#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(70px);background:#2c3e50;color:#fff;padding:10px 22px;border-radius:18px;font-size:13px;transition:transform .22s;z-index:9999;pointer-events:none;box-shadow:0 3px 14px rgba(0,0,0,.25);white-space:nowrap}
#toast.show{transform:translateX(-50%) translateY(0)}

.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1000;display:flex;align-items:center;justify-content:center}
.modal{background:#fff;border-radius:12px;padding:22px;max-width:440px;width:92%;max-height:80vh;overflow-y:auto;box-shadow:0 6px 28px rgba(0,0,0,.18)}
.modal h3{color:#4a90d9;margin-bottom:10px}
.modal-btns{display:flex;gap:8px;margin-top:13px;justify-content:flex-end}
/* 결석인정 영역 */
#excuse-section{margin:12px 16px 0;max-width:1700px;margin-left:auto;margin-right:auto;padding:0 16px}
.excuse-card{background:#fff8ee;border:2px dashed #e0a040;border-radius:12px;padding:14px 18px}
.excuse-card h3{font-size:13px;font-weight:700;color:#a06010;margin-bottom:10px}
.excuse-drop{min-height:52px;background:#fff3dc;border:2px dashed #d4902a;border-radius:9px;padding:10px 12px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;transition:background .15s}
.excuse-drop.dragover{background:#ffe8b0}
.excuse-chip{background:#f5c842;color:#5a3800;border-radius:20px;padding:4px 12px;font-size:12px;font-weight:700;display:flex;align-items:center;gap:6px}
.excuse-chip .rm{cursor:pointer;font-size:14px;color:#8b5a00;font-weight:900}
.excuse-placeholder{color:#c09040;font-size:12px;font-style:italic}
</style>

<body>

<div id="header">
  <div class="header-left">
    <h1>📋 AI입문 좌석 출석</h1>
    <span class="badge" id="mode-badge">🎓 학생</span>
  </div>
  <div class="header-center" id="header-center">
    AI입문 &nbsp;|&nbsp; 로딩 중...<br>
    <span>302동 408호 &nbsp;|&nbsp; 12:00 – 14:50</span>
  </div>
  <div></div>
</div>

<!-- ★ 상단 모드 전환 스위치 ★ (관리자 URL로 접속한 경우에만 표시) -->
<div id="mode-switch-bar" style="display:none">
  <span>화면 전환:</span>
  <div id="mode-toggle">
    <button class="active" id="btn-student" onclick="switchMode('student',this)">🎓 학생 화면</button>
    <button id="btn-admin" onclick="switchMode('admin',this)">👨‍🏫 관리자 화면</button>
  </div>
</div>

<div id="closed-banner">🔒 수업 마감됨 — 읽기 전용</div>
<div id="app"></div>
<div id="toast"></div>

<div id="roster-modal" style="display:none" class="modal-ov">
  <div class="modal">
    <h3>📝 학생 명단 수정</h3>
    <p style="font-size:11px;color:#8a9ab0;margin-bottom:8px">한 줄에 한 명씩 입력 (또는 엑셀 파일 업로드 — A열에 이름)</p>
    <input type="file" id="roster-file" accept=".xlsx,.xls,.csv" style="margin-bottom:8px;font-size:12px" onchange="loadRosterFile(event)">
    <textarea id="roster-ta" style="width:100%;height:240px;resize:vertical"></textarea>
    <div class="modal-btns">
      <button class="btn-gray" onclick="document.getElementById('roster-modal').style.display='none'">취소</button>
      <button class="btn-blue" onclick="saveRoster()">💾 저장</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script>
const LAYOUT = [
  { id:'sec1', rows:[
    {t:'ghost', n:3},{t:'ghost', n:3},{t:'access', n:1},
    {t:'desk', n:3},{t:'desk', n:3},{t:'desk', n:3},{t:'desk', n:3},{t:'desk', n:3},
  ]},
  { id:'sec2', rows: Array.from({length:8},()=>({t:'desk',n:3})) },
  { id:'sec3', rows: Array.from({length:8},()=>({t:'desk',n:3})) },
  { id:'sec4', rows: Array.from({length:8},()=>({t:'desk',n:3})) },
  { id:'sec5', rows: Array.from({length:8},()=>({t:'desk',n:3})) },
];
const DOOR_ROWS = [
  {t:'ghost'},{t:'door',txt:'🚪\n앞문'},
  {t:'ghost'},{t:'ghost'},{t:'ghost'},{t:'ghost'},{t:'ghost'},
  {t:'door',txt:'🚪\n뒷문'},
];

let students = [
  {name:'김진서',college:'',major:''},{name:'송현아',college:'',major:''},{name:'조현우',college:'',major:''},
  {name:'천승환',college:'',major:''},{name:'최석현',college:'',major:''},{name:'김채영',college:'',major:''},
  {name:'오찬영',college:'',major:''},{name:'최현빈',college:'',major:''},{name:'김리아',college:'',major:''},
  {name:'김재현',college:'',major:''},{name:'현성우',college:'',major:''},{name:'황득겸',college:'',major:''},
  {name:'서윤지',college:'',major:''},{name:'임준서',college:'',major:''},{name:'박민규',college:'',major:''},
  {name:'백승원',college:'',major:''},{name:'양지원',college:'',major:''},{name:'박지원',college:'',major:''},
  {name:'안희원',college:'',major:''},{name:'유동균',college:'',major:''},{name:'홍태균',college:'',major:''},
  {name:'홍석우',college:'',major:''},{name:'허준석',college:'',major:''},{name:'정민식',college:'',major:''},
  {name:'이현서',college:'',major:''},{name:'박인수',college:'',major:''},{name:'김민준',college:'',major:''},
  {name:'이형원',college:'',major:''},{name:'김동연',college:'',major:''},{name:'신동창',college:'',major:''},
  {name:'신진섭',college:'',major:''},{name:'김희서',college:'',major:''},{name:'임종민',college:'',major:''},
  {name:'전서연',college:'',major:''},{name:'박성준',college:'',major:''},{name:'이수연',college:'',major:''},
  {name:'김세준',college:'',major:''}
];

let seats={}, excused=new Set(), myName=null, isAdmin=false, closed=false, dragName=null, selectedSrc=null;

// ── localStorage로 이 기기의 이름 복원 ──
const LS_KEY = 'ai-attendance-name-' + sessionId;
const _savedName = localStorage.getItem(LS_KEY);
if (_savedName) myName = _savedName;

// ── Firebase 연동 ──
const firebaseConfig = {
  apiKey: "AIzaSyCvpg8GiKNER0yQtnEz-_ueetC4fuG2b_c",
  authDomain: "ai-attendance-26-3.firebaseapp.com",
  databaseURL: "https://ai-attendance-26-3-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "ai-attendance-26-3",
  storageBucket: "ai-attendance-26-3.firebasestorage.app",
  messagingSenderId: "969905693921",
  appId: "1:969905693921:web:8870c57a4ee3f4c0aec3a0"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// URL 파라미터로 세션 구분 (없으면 'default')
const urlParams = new URLSearchParams(window.location.search);
const sessionId = urlParams.get('session') || 'default';
const sessionRef = db.ref('sessions/' + sessionId);
const rosterRef  = db.ref('roster');

// URL 파라미터로 자동 뷰 전환
const viewParam = urlParams.get('view');   // 'student' 또는 'admin'
const keyParam  = urlParams.get('key');    // 관리자 비밀번호 base64
const ADMIN_KEY_B64 = btoa('1111');        // MTExMQ==

if (viewParam === 'admin' && keyParam === ADMIN_KEY_B64) {
  isAdmin = true;
  document.getElementById('mode-switch-bar').style.display = 'flex';
} else if (viewParam === 'student') {
  isAdmin = false;
  document.getElementById('mode-switch-bar').style.display = 'none';
}


let _remoteUpdating = false;

// ── roster + session 둘 다 받은 후 렌더 ──
// 둘 중 하나라도 아직 안 오면 기다림
let _gotRoster = false, _gotSession = false;
function _tryRender() {
  if (_gotRoster && _gotSession) {
    document.getElementById('closed-banner').style.display = closed ? 'block' : 'none';
    renderAll();
  }
}

// ── roster (전역 명단) 수신 ──
rosterRef.on('value', (snap) => {
  const data = snap.val();
  if (data && data.students && data.students.length > 0) {
    students = data.students;
  }
  // roster 노드가 아예 없어도 기본 students 유지하고 진행
  _gotRoster = true;
  _tryRender();
});

// ── 세션 (좌석/마감) 수신 ──
sessionRef.on('value', (snap) => {
  const data = snap.val();
  _remoteUpdating = true;
  if (data) {
    if (data.seats) seats = data.seats;
    if (data.excused) excused = new Set(data.excused);
    if (typeof data.closed === 'boolean') closed = data.closed;
  }
  _gotSession = true;
  if (_gotRoster) {
    // 이미 초기 렌더 이후 업데이트
    document.getElementById('closed-banner').style.display = closed ? 'block' : 'none';
    renderAll();
  }
  _remoteUpdating = false;
});

// ── 안전망: 2초 후에도 안 그려지면 강제 렌더 ──
setTimeout(() => {
  if (!_gotRoster || !_gotSession) {
    _gotRoster = true; _gotSession = true;
    document.getElementById('closed-banner').style.display = closed ? 'block' : 'none';
    renderAll();
  }
}, 2000);

// 로컬 변경 → Firebase로 전송
function pushToFirebase(){
  if (_remoteUpdating) return;
  sessionRef.set({ seats, excused:[...excused], closed });
}

// 명단만 roster에 저장 (전 회차 공유)
function pushRoster(){
  rosterRef.set({ students, updatedAt: sessionId });
}

// ── 모드 전환 ──
function switchMode(mode, btn) {
  isAdmin = (mode === 'admin');
  selectedSrc = null;

  document.querySelectorAll('#mode-toggle button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  const badge = document.getElementById('mode-badge');
  badge.className = 'badge ' + (isAdmin ? 'badge-admin' : 'badge-student');
  badge.textContent = isAdmin ? '👨‍🏫 관리자' : '🎓 학생';

  toast(isAdmin ? '👨‍🏫 관리자 화면으로 전환' : '🎓 학생 화면으로 전환');
  renderAll();
}

window.addEventListener('DOMContentLoaded', () => {
  // 헤더 날짜/회차 업데이트
  const SESSION_MAP = {
    'w1_0623':  {n:1,  date:'2026-06-23', day:'화'},
    'w2_0629':  {n:2,  date:'2026-06-29', day:'월'},
    'w3_0630':  {n:3,  date:'2026-06-30', day:'화'},
    'w4_0706':  {n:4,  date:'2026-07-06', day:'월'},
    'w5_0707':  {n:5,  date:'2026-07-07', day:'화'},
    'w6_0709':  {n:6,  date:'2026-07-09', day:'목'},
    'w7_0713':  {n:7,  date:'2026-07-13', day:'월'},
    'w8_0714':  {n:8,  date:'2026-07-14', day:'화'},
    'w9_0715':  {n:9,  date:'2026-07-15', day:'수'},
    'w10_0716': {n:10, date:'2026-07-16', day:'목'},
    'w11_0718': {n:11, date:'2026-07-18', day:'토'},
    'w12_0720': {n:12, date:'2026-07-20', day:'월'},
    'w13_0721': {n:13, date:'2026-07-21', day:'화'},
    'w14_0723': {n:14, date:'2026-07-23', day:'목'},
    'w15_0727': {n:15, date:'2026-07-27', day:'월'},
  };
  const sessInfo = SESSION_MAP[sessionId];
  const hEl = document.getElementById('header-center');
  if (hEl) {
    if (sessInfo) {
      hEl.innerHTML = `AI입문 &nbsp;|&nbsp; ${sessInfo.n}회차 &nbsp;|&nbsp; ${sessInfo.date} (${sessInfo.day})<br><span>302동 408호 &nbsp;|&nbsp; 12:00 – 14:50</span>`;
    } else {
      hEl.innerHTML = `AI입문 &nbsp;|&nbsp; ${sessionId}<br><span>302동 408호 &nbsp;|&nbsp; 12:00 – 14:50</span>`;
    }
  }
  // URL 파라미터에 따라 초기 버튼 active 상태 동기화
  if (isAdmin) {
    document.getElementById('btn-student').classList.remove('active');
    document.getElementById('btn-admin').classList.add('active');
  }
  renderAll();
});

// ── 전체 렌더 ──
function renderAll() {
  const n2s = getN2S();
  const names = getNames();
  const cnt = Object.keys(seats).length;
  const pct = names.length ? Math.round(cnt/names.length*100) : 0;

  document.getElementById('app').innerHTML = `
  <div class="view">
    <div id="topbar">${isAdmin ? adminBar() : studentBar(n2s)}</div>
    <div id="main-layout">
      <div id="sidebar">
        <div class="card">
          <h3>현황</h3>
          <div class="stat-row"><span>전체</span><span class="stat-num c-blue">${names.length}</span></div>
          <div class="stat-row"><span>착석</span><span class="stat-num c-green">${cnt}</span></div>
          <div class="stat-row"><span>결석인정</span><span class="stat-num" style="color:#d4902a">${excused.size}</span></div>
          <div class="stat-row"><span>미착석</span><span class="stat-num c-red">${names.length-cnt-excused.size}</span></div>
          <div id="prog-bg"><div id="prog-fill" style="width:${pct}%"></div></div>
          <div id="prog-txt">${pct}%</div>
        </div>
        <div class="card">
          <h3>학생 명단</h3>
          <ul id="name-list">${buildNameList(n2s)}</ul>
        </div>
      </div>
      <div id="chart-area" style="flex:1;min-width:0;display:flex;flex-direction:column;gap:10px">
        ${!isAdmin ? `<div class="student-guide">
          ① 내 이름 선택 → 확인 클릭 → 빈 자리 클릭하면 착석!
          &nbsp;&nbsp;|&nbsp;&nbsp;
          ② 내 자리(파란색) 클릭 → 다른 빈 자리 클릭하면 이동
          &nbsp;&nbsp;|&nbsp;&nbsp;
          ③ 1인 1좌석만 가능
        </div>` : ''}
        <div id="chart-wrap">${buildChartHTML()}</div>
      </div>
    </div>
    ${isAdmin ? absentHTML(n2s) : ''}
  </div>
  <div id="excuse-section">
    ${buildExcuseHTML(n2s)}
  </div>`;

  attachDrag();
}

function buildNameList(n2s) {
  const sorted = [...students].sort((a,b)=>{
    const na = typeof a==='object'?a.name:a;
    const nb = typeof b==='object'?b.name:b;
    return na.localeCompare(nb,'ko');
  });
  return sorted.map(s => {
    const nm = typeof s==='object'?s.name:s;
    const college = typeof s==='object'?s.college:'';
    const major = typeof s==='object'?s.major:'';
    const seated = !!n2s[nm];
    const isExcused = excused.has(nm);
    const isMe = !isAdmin && nm === myName;
    const canDrag = !closed && !isExcused && (isAdmin || (isMe && !seated));
    let cls = '';
    if (seated) cls += ' seated';
    if (isExcused) cls += ' seated'; // 결석인정도 회색 처리
    if (isMe && !seated && !isExcused) cls += ' is-me';
    if (canDrag) cls += ' can-drag';
    const sub = isAdmin && (college||major) ? `<span style="font-size:11px;color:#8a9ab0;margin-left:4px">(${[college,major].filter(Boolean).join('/')})</span>` : '';
    const badge = isExcused ? '<span style="font-size:10px;background:#f5c842;color:#5a3800;border-radius:8px;padding:1px 6px;margin-left:4px">결석인정</span>' : '';
    return `<li class="${cls.trim()}" data-name="${nm}">
      <span>${nm}${badge}${sub}</span>${seated&&!isExcused?'<span class="chk">✓</span>':''}
    </li>`;
  }).join('');
}

function attachDrag() {
  document.querySelectorAll('#name-list li.can-drag').forEach(li => {
    li.draggable = true;
    li.addEventListener('dragstart', e => {
      dragName = li.dataset.name; selectedSrc = null;
      e.dataTransfer.effectAllowed = 'move';
      li.classList.add('dragging');
    });
    li.addEventListener('dragend', () => li.classList.remove('dragging'));
  });
  // 내 좌석(occupied/mine) 드래그로 이동
  if (!closed) {
    document.querySelectorAll('.seat.mine, .seat.occupied').forEach(seatEl => {
      const sid = seatEl.dataset.sid;
      const occ = seats[sid];
      const canDragSeat = isAdmin ? !!occ : (occ === myName);
      if (!canDragSeat) return;
      seatEl.draggable = true;
      seatEl.addEventListener('dragstart', e => {
        dragName = occ; selectedSrc = null;
        e.dataTransfer.effectAllowed = 'move';
        seatEl.classList.add('dragging');
      });
      seatEl.addEventListener('dragend', () => seatEl.classList.remove('dragging'));
    });
  }
}

function adminBar() {
  if (closed) return `
    <strong style="color:#c05050">🔒 마감 완료</strong>
    <button class="btn-green" onclick="exportCSV()">📥 CSV 저장</button>
    <button class="btn-orange" onclick="reopenSession()">🔓 재개</button>`;
  return `
    <strong style="color:#4a90d9;font-size:12px">👨‍🏫 관리자</strong>
    <button class="btn-red" onclick="closeSession()">🔒 수업 마감</button>
    <button class="btn-orange" onclick="resetSeats()">🔄 전체 초기화</button>
    <button class="btn-gray" onclick="showRosterModal()">📝 명단 수정</button>
    <button class="btn-green" onclick="exportCSV()">📥 CSV 저장</button>`;
}

function studentBar(n2s) {
  if (closed) return `<span style="color:#c05050;font-weight:700">🔒 수업이 마감되었습니다</span>`;
  const names = getNames();
  const avail = names.filter(n => (!n2s[n] && !excused.has(n)) || n === myName);
  return `
    <span style="font-size:15px;color:#4a90d9;font-weight:800;white-space:nowrap">👤 내 이름 선택</span>
    <select id="name-dd" style="min-width:135px;font-size:14px;font-weight:700">
      <option value="">-- 선택하세요 --</option>
      ${avail.map(n=>`<option value="${n}" ${n===myName?'selected':''}>${n}</option>`).join('')}
    </select>
    <button class="btn-blue" onclick="claimName()">✅ 확인</button>
    ${myName ? `<span class="my-badge">현재: ${myName}</span>` : ''}`;
}

function buildChartHTML() {
  const secs = isAdmin ? LAYOUT : [...LAYOUT].reverse();
  const board = `<div class="board-bar">▲ &nbsp;&nbsp;&nbsp; 칠 판 &nbsp;&nbsp;&nbsp; ▲</div>`;
  const back  = `<div class="back-bar">뒤 쪽</div>`;

  let sectionsHTML = `<div class="sections-row">`;
  if (isAdmin) sectionsHTML += buildDoorCol();

  secs.forEach(sec => {
    const ordered = isAdmin ? sec.rows.map((_,i)=>i).reverse() : sec.rows.map((_,i)=>i);
    let rowsHTML = '';
    ordered.forEach(ri => {
      const row = sec.rows[ri];
      if (row.t === 'ghost') {
        rowsHTML += `<div class="desk-row">${Array.from({length:row.n},()=>`<div class="seat ghost"></div>`).join('')}</div>`;
      } else if (row.t === 'access') {
        rowsHTML += `<div class="desk-row"><div class="seat access">♿</div></div>`;
      } else {
        let cells = '';
        const cols = isAdmin ? Array.from({length:row.n},(_,i)=>row.n-1-i) : Array.from({length:row.n},(_,i)=>i);
        cols.forEach(ci => {
          const sid = `${sec.id}_r${ri}_c${ci}`;
          const occ = seats[sid];
          const isMe = !isAdmin && occ === myName;
          const isSrc = selectedSrc === sid;
          let cls = 'seat ' + (occ ? (isMe?'mine':'occupied') : 'empty');
          if (isSrc) cls += ' selected-src';
          const lbl = occ ? (occ.length>5 ? occ.slice(0,4)+'…' : occ) : '';
          cells += `<div class="${cls}" id="s_${sid}" data-sid="${sid}"
            ondragover="ov(event)" ondragleave="ol(event)" ondrop="od(event,'${sid}')"
            onclick="sc('${sid}')">${lbl}</div>`;
        });
        rowsHTML += `<div class="desk-row">${cells}</div>`;
      }
    });
    sectionsHTML += `<div class="section">${rowsHTML}</div>`;
  });

  if (!isAdmin) sectionsHTML += buildDoorCol();
  sectionsHTML += `</div>`;

  return `<div class="chart-outer">
    ${isAdmin ? back : board}
    ${sectionsHTML}
    ${isAdmin ? board : back}
  </div>`;
}

function buildDoorCol() {
  const ordered = isAdmin ? DOOR_ROWS.map((_,i)=>i).reverse() : DOOR_ROWS.map((_,i)=>i);
  return `<div class="section">${ordered.map(ri => {
    const r = DOOR_ROWS[ri];
    return r.t==='door'
      ? `<div class="door-cell">${r.txt.replace('\n','<br>')}</div>`
      : `<div class="door-ghost"></div>`;
  }).join('')}</div>`;
}

function buildExcuseHTML(n2s) {
  const chips = [...excused].map(n => {
    const canRemove = isAdmin || (!isAdmin && n === myName && !closed);
    return `<span class="excuse-chip">${n}${canRemove ? `<span class="rm" onclick="removeExcuse('${n}')">✕</span>` : ''}</span>`;
  }).join('');

  // 학생: 본인 이름이 결석인정에 없고, 착석도 안 한 경우에만 드롭 가능
  const myExcused = excused.has(myName);
  const mySeated = !!n2s[myName];
  const canDrop = !closed && (isAdmin || (!isAdmin && myName && !myExcused && !mySeated));

  return `<div class="excuse-card">
    <h3>📋 결석인정 ${isAdmin ? '<span style="font-size:11px;color:#999;font-weight:400">(드래그로 추가/✕로 제거)</span>' : '<span style="font-size:11px;color:#999;font-weight:400">(내 이름을 여기로 드래그하면 결석인정 처리)</span>'}</h3>
    <div class="excuse-drop" id="excuse-drop"
      ondragover="${canDrop ? 'exOv(event)' : 'event.preventDefault()'}"
      ondragleave="exOl(event)"
      ondrop="${canDrop ? 'exDrop(event)' : ''}">
      ${chips || `<span class="excuse-placeholder">이름을 여기로 드래그하세요</span>`}
    </div>
  </div>`;
}

function absentHTML(n2s) {
  const absent = getNames().filter(n=>!n2s[n] && !excused.has(n));
  if (!absent.length)
    return `<div id="absent-wrap"><div class="absent-card" style="background:#d8f5e4;border-color:#7dd4a0;color:#1a5530;font-weight:700">✅ 전원 착석 완료!</div></div>`;
  return `<div id="absent-wrap"><div class="absent-card">
    <h3>❌ 미착석 ${absent.length}명</h3>
    <div class="chips">${absent.map(n=>`<span class="chip">${n}</span>`).join('')}</div>
  </div></div>`;
}

function ov(e){e.preventDefault();if(!closed)e.currentTarget.classList.add('dragover');}
function exOv(e){e.preventDefault();e.currentTarget.classList.add('dragover');}
function exOl(e){e.currentTarget.classList.remove('dragover');}
function exDrop(e){
  e.preventDefault();e.currentTarget.classList.remove('dragover');
  if(!dragName||closed)return;
  const nm = dragName; dragName=null;
  // 학생은 본인 이름만
  if(!isAdmin && nm !== myName){toast('⚠️ 본인 이름만 결석인정 처리할 수 있어요');return;}
  if(excused.has(nm)){toast('이미 결석인정 처리됨');return;}
  // 기존 좌석에서 제거
  Object.keys(seats).forEach(s=>{if(seats[s]===nm)delete seats[s];});
  excused.add(nm);
  afterChange();
  toast(`📋 "${nm}" 결석인정 처리`);
}
function removeExcuse(nm){
  if(!isAdmin && nm !== myName){toast('⚠️ 본인 것만 취소할 수 있어요');return;}
  excused.delete(nm);afterChange();toast(`↩️ "${nm}" 결석인정 취소`);
}
function ol(e){e.currentTarget.classList.remove('dragover');}
function od(e,sid){
  e.preventDefault();e.currentTarget.classList.remove('dragover');
  if(!dragName||closed)return;
  assignSeat(dragName,sid);dragName=null;
}

function sc(sid){
  if(closed){toast('🔒 마감된 수업');return;}
  const occ=seats[sid];
  if(isAdmin){
    if(occ){delete seats[sid];selectedSrc=null;afterChange();toast(`🗑️ "${occ}" 제거`);}
    else toast('💡 명단에서 이름을 드래그해서 배정하세요');
    return;
  }
  if(!myName){toast('⚠️ 먼저 본인 이름을 선택하세요');return;}
  if(occ===myName){
    if(selectedSrc===sid){selectedSrc=null;refreshChart();toast('↩️ 이동 취소');}
    else{selectedSrc=sid;refreshChart();toast('✋ 이동할 빈 자리를 클릭하세요');}
    return;
  }
  if(occ){toast('❌ 이미 다른 학생 자리');return;}
  assignSeat(myName,sid);
}

function assignSeat(name,sid){
  if(seats[sid]&&seats[sid]!==name){
    if(isAdmin){ delete seats[sid]; }
    else { toast('❌ 이미 다른 학생 자리'); return; }
  }
  Object.keys(seats).forEach(s=>{if(seats[s]===name)delete seats[s];});
  seats[sid]=name;selectedSrc=null;
  afterChange();
  toast(`✅ "${name}" 착석 완료!`);
  setTimeout(()=>{
    const el=document.getElementById('s_'+sid);
    if(el){el.classList.add('flash');setTimeout(()=>el.classList.remove('flash'),420);}
  },20);
}

function refreshChart(){const w=document.getElementById('chart-wrap');if(w)w.innerHTML=buildChartHTML();}
function afterChange(){selectedSrc=null;renderAll();pushToFirebase();}
function getN2S(){const m={};Object.entries(seats).forEach(([s,n])=>m[n]=s);return m;}
function getNames(){return students.map(s=>typeof s==='object'?s.name:s);}

function closeSession(){
  if(!confirm('마감하면 좌석 변경 불가. 마감할까요?'))return;
  closed=true;document.getElementById('closed-banner').style.display='block';
  renderAll();toast('🔒 수업 마감!');pushToFirebase();
}
function reopenSession(){
  closed=false;document.getElementById('closed-banner').style.display='none';
  renderAll();toast('🔓 재개');pushToFirebase();
}
function resetSeats(){if(!confirm('전체 초기화?'))return;seats={};afterChange();toast('🔄 초기화');}

function loadRosterFile(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    const wb = XLSX.read(ev.target.result, {type:'binary'});
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, {header:1});
    // A열=이름, B열=대학, C열=전공
    const parsed = rows
      .map(r=>({name:String(r[0]||'').trim(), college:String(r[1]||'').trim(), major:String(r[2]||'').trim()}))
      .filter(r=>r.name);
    // textarea에 미리보기 (이름|대학|전공 형식)
    document.getElementById('roster-ta').value = parsed.map(r=>`${r.name}\t${r.college}\t${r.major}`).join('\n');
    toast(`📥 ${parsed.length}명 불러옴 — 저장 버튼을 눌러 적용`);
  };
  reader.readAsBinaryString(file);
}

function showRosterModal(){
  document.getElementById('roster-ta').value = students.map(s=>
    typeof s==='object' ? `${s.name}\t${s.college}\t${s.major}` : s
  ).join('\n');
  document.getElementById('roster-modal').style.display='flex';
}

function saveRoster(){
  const lines = document.getElementById('roster-ta').value.split('\n').map(l=>l.trim()).filter(Boolean);
  const parsed = lines.map(l=>{
    const parts = l.split(/\t|,/);
    return {name:(parts[0]||'').trim(), college:(parts[1]||'').trim(), major:(parts[2]||'').trim()};
  }).filter(r=>r.name);
  const names = parsed.map(r=>r.name);
  const n2s = getN2S();
  // 명단에 없는 학생 자리 제거
  Object.entries(n2s).forEach(([n,s])=>{if(!names.includes(n))delete seats[s];});
  students = parsed;
  document.getElementById('roster-modal').style.display='none';
  afterChange();
  pushRoster();      // 명단은 roster에 저장 (전 회차 공유)
  pushToFirebase();  // 좌석/마감 상태는 세션에 저장
  toast(`✅ 명단 저장 (${parsed.length}명) — 전 회차 적용됨`);
}

function claimName(){
  const v=document.getElementById('name-dd')?.value;
  if(!v){toast('이름을 선택해 주세요');return;}
  myName=v;selectedSrc=null;
  localStorage.setItem(LS_KEY, v); // 기기에 이름 저장
  toast(`"${v}" 선택 완료 — 빈 자리를 클릭하거나 결석인정 칸에 이름을 놓으세요!`);
  renderAll();
}

function exportCSV(){
  const n2s=getN2S();
  let csv='\uFEFF이름,대학,전공,착석여부,좌석ID,결석인정\n';
  students.forEach(s=>{
    const nm = typeof s==='object'?s.name:s;
    const college = typeof s==='object'?s.college:'';
    const major = typeof s==='object'?s.major:'';
    const sid=n2s[nm]||'';
    const ex=excused.has(nm);
    csv+=`${nm},${college},${major},${ex?'결석인정':(sid?'출석':'결석')},${sid},${ex?'Y':''}\n`;
  });
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));
  a.download=`AI입문_출결_${sessionId}.csv`;
  a.click();toast('📥 CSV 저장!');
}

function toast(msg,ms=2600){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),ms);
}
</script>
